# dotfile-rs config for Hyprland

name = "hypr"
description = "Hyprland dotfile config"

# Hard dependencies: session-critical pieces this config autostarts
# (exec-once) or binds to. Probed with `command -v` so we never launch
# a daemon/GUI (hyprpaper/hyprlauncher would otherwise start), and
# because `hyprctl --version` exits non-zero.
validation_commands = [
  ["sh", "-c", "command -v Hyprland"],
  ["sh", "-c", "command -v waybar"],
  ["sh", "-c", "command -v hyprpaper"],
  ["sh", "-c", "command -v hyprlauncher"],
]

# Soft dependencies: keybind / click helpers. Missing ones only warn.
optional_validation_commands = [
  ["sh", "-c", "test -x ~/.local/bin/toastty"],  # $terminal
  ["sh", "-c", "command -v dolphin"],            # $fileManager
  ["sh", "-c", "command -v wpctl"],              # XF86Audio* volume keys (wireplumber)
  ["sh", "-c", "command -v playerctl"],          # XF86Audio* media keys
  ["sh", "-c", "command -v brightnessctl"],      # XF86MonBrightness* keys (laptop only)
]


[[configs]]
name = "main hyprland config (lua)"
path = "hyprland.lua"
install_location = { linux = "~/.config/hypr/hyprland.lua" }

[[configs]]
name = "config folder"
path = "confs/"
install_location = { linux = "~/.config/hypr/confs/" }

[[configs]]
name = "hyprtoolkit theme"
path = "hyprtoolkit.conf"
install_location = { linux = "~/.config/hypr/hyprtoolkit.conf" }

# lua-language-server config so hyprland.lua resolves the `hl` global from
# Hyprland's shipped type stubs (/usr/share/hypr/stubs). Kills "undefined
# global hl" warnings and enables autocomplete for hl.* / hl.dsp. / config keys.
[[configs]]
name = "lua-language-server config"
path = ".luarc.json"
install_location = { linux = "~/.config/hypr/.luarc.json" }

# rofi "command palette" of the keybinds defined above. Bound to SUPER + K.
# Sources keybinds.lua under a stubbed `hl` to list every bind (incl. the
# workspace loop) with a readable label, then runs the chosen one.
[[configs]]
name = "keybind palette script"
path = "scripts/keybind-palette.sh"
install_location = { linux = "~/.config/hypr/scripts/keybind-palette.sh" }
