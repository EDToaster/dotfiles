# Hyprtoolkit palette. Themes ALL Hyprtoolkit apps (hyprlauncher, etc.),
# not just hyprlauncher — Hyprtoolkit has no per-app theming.
#
# Raycast-style: frosted glass background + red (#FF6363) accent.
# The glass/blur itself is NOT set here — it comes from the `hyprlauncher`
# layerrule in hyprland.conf. This file only sets the (translucent) colors.
#
# Colors are 0xAARRGGBB hex ints (AA = alpha). e.g. #FF6363 -> 0xFFFF6363.

# --- colors ---
background       = 0xCC1C1C1E   # translucent (alpha 0xCC ~ 80%) so the compositor's blur shows through
base             = 0xE6232327   # search input / list base
alternate_base   = 0xE62A2A2E   # alternating / hovered rows
text             = 0xFFE5E5E7
bright_text      = 0xFFFFFFFF
link_text        = 0xFFFF6363
accent           = 0xFFFF6363   # selection highlight + accents
accent_secondary = 0xFFE04848

# --- shape & type ---
rounding_large        = 12
rounding_small        = 8
font_family           = MesloLGS Nerd Font Propo
font_family_monospace = JetBrainsMono Nerd Font Propo

# Defaults shown for reference; uncomment to override:
# h1_size         = 19
# h2_size         = 15
# h3_size         = 13
# font_size       = 11
# small_font_size = 10
# icon_theme      =          # empty = first one found
