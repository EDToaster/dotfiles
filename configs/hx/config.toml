# Helix editor config for EDToaster
# Meant to be symlinked at ~/.config/helix/config.toml for Linux/MacOS
# or at %AppData%\helix\config.toml

# theme = "catppuccin_frappe"
# theme = "catppuccin_soft"
# theme = "everforest_dark"
theme = "gruvbox"

[editor]
# Change line numbers to relative in non-insert mode
line-number = "relative"
bufferline  = "always"

# jump-label-alphabet = "fjdkslaghtyrueiwoqpbnvmcxz"
# jump-label-alphabet = "asdfgzxcvbqwertjklhuiopymn"
jump-label-alphabet = "asdfwerzxcvjkluiopmghtybn"

rulers = [120]

# Add horizontal line to current cursor
cursorline = true

true-color  = true
color-modes = true

# Set default shell for pipe, sh, insert-output, etc.
shell = ["zsh", "-c"]

end-of-line-diagnostics = "hint"

[editor.statusline]
left = [ "mode", "spinner", "file-name", "read-only-indicator", "file-modification-indicator", "separator", "version-control" ]
center = ["file-type"]
mode = { normal = "🏄 NORMAL", insert = "👉 INSERT", select = "🔍 SELECT" }
separator = " "

[keys.normal]
# Allow <esc> to collapse selection
esc = ["collapse_selection", "keep_primary_selection"]

# Unbind default movement keys and bind new ones
# h   = "no_op"
# j   = "no_op"
# k   = "move_char_left"
# l   = "move_line_down"
# ";" = "move_line_up"
# "'" = "move_char_right"

";" = "flip_selections"

C-r       = ":reload"
C-w       = ":buffer-close"
"C-left"  = "goto_previous_buffer"
"C-right" = "goto_next_buffer"
"C-,"     = "goto_previous_buffer"
"C-."     = "goto_next_buffer"
# Move line up/down using Control + arrow
"C-down"  = "@ml\"mdj\"mP"
"C-up"    = "@ml\"mdk\"mP"

C-a = ":sh unibear add_file %{buffer_name}"

# This overrides extend_to_line_bounds, see same for select mode
x = "select_line_below"
X = "select_line_above"

Y = "yank_joined"

ret = "@gw"

[keys.normal.space]
m = ":toggle-option soft-wrap.enable"
z = [
  "goto_first_nonwhitespace",
  "extend_to_line_end",
  ":pipe-to xargs -I {} -- zellij r -f -- zsh -c '{}'"
]

# Only works in non-windows environments :(
e     = [":open %sh{~/.config/helix/scripts/yazi-picker.sh '%{buffer_name}'}", ":redraw"]
E     = [":open %sh{~/.config/helix/scripts/yazi-picker.sh}", ":redraw"]
t     = [":open %sh{~/.config/helix/scripts/fzf-picker.sh}", "extend_to_line_bounds"]
T     = [":open %sh{~/.config/helix/scripts/fzf-picker-v2.sh}", "extend_to_line_bounds"]

C-r   = ":config-reload"

[keys.normal.space.","]
a = ":sh git add -A"
s = ":sh git status"
c = ":sh git commit"
b = ":echo %sh{git blame -L %{cursor_line},%{cursor_line} -- %{buffer_name}}"
w = ":sh ~/.config/helix/scripts/open-gh.sh %{buffer_name} %{cursor_line}"

g = ":sh zellij run -x 10%% -y 10%% --width 80%% --height 80%% --pinned true -fc -n 'lazygit -- q to quit' -- lazygit"
r = ":reset-diff-change"

[keys.normal.m]
l = "extend_to_line_bounds"

[keys.select]
x = "select_line_below"
X = "select_line_above"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.lsp]
display-inlay-hints = true
display-messages    = true

[editor.inline-diagnostics]
cursor-line = "warning"

[editor.indent-guides]
render = true
character = "┆"
skip-levels = 1

[editor.file-picker]
# Show hidden files
hidden = false
